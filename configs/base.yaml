project:
  name: risk_aware_rl_trading
  seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  models: models

market:
  symbol: BTC-USD
  interval: 1d
  start: 2018-01-01
  end: 2024-12-31

features:
  rsi_window: 14
  ma_fast: 10
  ma_slow: 50

training:
  algo: PPO
  timesteps: 200000
  train_split: 0.8

reward:
  risk_penalty: 0.1
  transaction_cost: 0.0005
